version: "3.8"

services:
  db:
    image: postgres:16
    container_name: trainee-db
    restart: always
    environment:
      POSTGRES_DB: trainee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TIGER
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: trainee-api
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/trainee_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: TIGER
